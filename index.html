<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fall of Angels | سقوط فرشته‌ها</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@700&family=Special+Elite&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #050400;
      --paper:   #0a0900;
      --border:  #2a2000;
      --dim:     #5a4800;
      --mid:     #a07820;
      --text:    #e8d890;
      --accent:  #c9a227;
      --accent2: #f0d060;
      --danger:  #8a2a2a;
      --glow:    rgba(201,162,39,0.12);
      --gold:    #c9a227;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── INTRO SLIDESHOW ── */
    #intro {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #intro-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.6s ease;
      position: absolute;
      inset: 0;
    }

    #intro-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: var(--gold);
      width: 0%;
      transition: width linear;
      box-shadow: 0 0 8px var(--gold);
    }

    #intro-skip {
      position: absolute;
      bottom: 24px;
      right: 24px;
      background: transparent;
      border: 1px solid rgba(201,162,39,0.4);
      color: rgba(201,162,39,0.7);
      padding: 7px 18px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #intro-skip:hover {
      border-color: var(--gold);
      color: var(--gold);
      box-shadow: 0 0 12px rgba(201,162,39,0.2);
    }

    /* ── MUSIC BELL (top fixed) ── */
    #music-bell-wrap {
      position: fixed;
      top: 18px;
      right: 22px;
      z-index: 200;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    #music-bell-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
      outline: none;
      position: relative;
    }

    #music-bell-btn svg {
      width: 36px;
      height: 36px;
      filter: drop-shadow(0 0 6px rgba(201,162,39,0.5));
      transition: filter 0.2s, transform 0.2s;
    }

    #music-bell-btn:hover svg {
      filter: drop-shadow(0 0 14px rgba(240,208,96,0.8));
      transform: scale(1.1);
    }

    #music-bell-btn.muted svg {
      filter: drop-shadow(0 0 3px rgba(201,162,39,0.2));
      opacity: 0.45;
    }

    /* bell swing animation when playing */
    @keyframes bell-swing {
      0%,100% { transform: rotate(0deg); }
      15%      { transform: rotate(12deg); }
      45%      { transform: rotate(-10deg); }
      70%      { transform: rotate(6deg); }
      85%      { transform: rotate(-4deg); }
    }

    #music-bell-btn.playing svg {
      animation: bell-swing 3.5s ease-in-out infinite;
      transform-origin: top center;
    }

    #bell-label {
      font-size: 0.45rem;
      letter-spacing: 2px;
      color: rgba(201,162,39,0.45);
      font-family: 'Share Tech Mono', monospace;
    }

    /* ── MAIN PAGE ── */
    #main-page {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }
    #main-page.visible {
      display: flex;
    }

    /* scanlines */
    #main-page::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.008) 2px,
        rgba(255,255,255,0.008) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* gold radial bg */
    #main-page::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(201,162,39,0.04) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .lang-container {
      max-width: 560px;
      width: 100%;
      text-align: center;
      border: 1px solid #2a2000;
      padding: 52px 40px;
      position: relative;
      background: var(--paper);
      box-shadow:
        0 0 80px rgba(0,0,0,0.95),
        0 0 40px rgba(201,162,39,0.06),
        inset 0 0 60px rgba(0,0,0,0.6);
      z-index: 2;
    }

    /* double border frame */
    .lang-container::before {
      content: '';
      position: absolute;
      top: 8px; left: 8px; right: 8px; bottom: 8px;
      border: 1px solid #1a1400;
      pointer-events: none;
    }

    /* corner ornaments */
    .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.5;
    }
    .corner-tl { top: 4px; left: 4px; border-width: 1px 0 0 1px; }
    .corner-tr { top: 4px; right: 4px; border-width: 1px 1px 0 0; }
    .corner-bl { bottom: 4px; left: 4px; border-width: 0 0 1px 1px; }
    .corner-br { bottom: 4px; right: 4px; border-width: 0 1px 1px 0; }

    /* ── LOGO SVG ── */
    .logo-wrap {
      margin: 10px 0 32px;
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-svg {
      width: 100%;
      max-width: 420px;
      height: auto;
      overflow: visible;
    }

    /* ── TAGLINE ── */
    .separator {
      border: none;
      border-top: 1px solid #1a1400;
      margin: 22px 0;
      position: relative;
    }
    .separator::before {
      content: '◆';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--paper);
      padding: 0 8px;
      font-size: 0.5rem;
      color: var(--gold);
    }

    .tagline {
      font-family: 'Special Elite', serif;
      font-style: italic;
      font-size: 0.88rem;
      line-height: 2;
      color: var(--mid);
      position: relative;
      z-index: 1;
    }

    .tagline .en {
      font-size: 0.82rem;
      letter-spacing: 1px;
      display: block;
      margin-bottom: 6px;
    }

    .tagline .fa {
      direction: rtl;
      display: block;
      font-size: 0.9rem;
      color: rgba(201,162,39,0.6);
    }

    /* ── BUTTONS ── */
    .lang-label {
      font-size: 0.55rem;
      letter-spacing: 4px;
      color: #3a3000;
      margin-bottom: 18px;
      position: relative; z-index: 1;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
      position: relative; z-index: 1;
    }

    .btn {
      background: transparent;
      border: 1px solid #3a3000;
      color: var(--text);
      padding: 14px 0;
      width: 160px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 4px;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(201,162,39,0.06) 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: var(--gold);
      transform: scaleX(0);
      transition: transform 0.3s;
    }

    .btn:hover {
      border-color: var(--gold);
      color: var(--accent2);
      box-shadow: 0 0 20px rgba(201,162,39,0.1), inset 0 0 20px rgba(201,162,39,0.04);
    }
    .btn:hover::before { opacity: 1; }
    .btn:hover::after  { transform: scaleX(1); }

    .footer-line {
      font-size: 0.5rem;
      letter-spacing: 2px;
      color: #1a1400;
      line-height: 2.2;
      position: relative; z-index: 1;
    }
  </style>
</head>
<body>

  <!-- ══ INTRO SLIDESHOW ══ -->
  <div id="intro">
    <img id="intro-img" src="" alt="" />
    <div id="intro-progress"></div>
    <button id="intro-skip">SKIP ▶</button>
  </div>

  <!-- ══ MUSIC BELL (top right) ══ -->
  <div id="music-bell-wrap">
    <button id="music-bell-btn" class="muted" title="Toggle Music">
      <!-- Bell SVG -->
      <svg viewBox="0 0 64 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- rope/hook -->
        <line x1="32" y1="2" x2="32" y2="10" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round"/>
        <!-- bell body -->
        <path d="M32 10 C18 10 12 22 12 36 L12 50 Q12 54 16 54 L48 54 Q52 54 52 50 L52 36 C52 22 46 10 32 10 Z"
              fill="url(#bellGrad)" stroke="#c9a227" stroke-width="1.5"/>
        <!-- shine highlight -->
        <path d="M22 18 C20 22 18 28 18 34" stroke="rgba(255,235,120,0.35)" stroke-width="2.5" stroke-linecap="round"/>
        <!-- rim band -->
        <rect x="11" y="50" width="42" height="6" rx="3"
              fill="url(#rimGrad)" stroke="#c9a227" stroke-width="1"/>
        <!-- clapper -->
        <circle cx="32" cy="61" r="4.5" fill="url(#clapperGrad)" stroke="#c9a227" stroke-width="1"/>
        <!-- mute X (shown when muted) -->
        <g id="mute-x" opacity="0">
          <line x1="44" y1="4" x2="58" y2="18" stroke="#8a2a2a" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="58" y1="4" x2="44" y2="18" stroke="#8a2a2a" stroke-width="2.5" stroke-linecap="round"/>
        </g>
        <!-- ornamental lines on bell -->
        <line x1="20" y1="42" x2="44" y2="42" stroke="rgba(201,162,39,0.3)" stroke-width="1"/>
        <line x1="17" y1="46" x2="47" y2="46" stroke="rgba(201,162,39,0.2)" stroke-width="0.8"/>
        <defs>
          <linearGradient id="bellGrad" x1="12" y1="10" x2="52" y2="54" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#f0d060"/>
            <stop offset="40%" stop-color="#c9a227"/>
            <stop offset="100%" stop-color="#7a5c00"/>
          </linearGradient>
          <linearGradient id="rimGrad" x1="11" y1="50" x2="53" y2="56" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#e8c040"/>
            <stop offset="50%" stop-color="#c9a227"/>
            <stop offset="100%" stop-color="#6a4e00"/>
          </linearGradient>
          <radialGradient id="clapperGrad" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#e8c040"/>
            <stop offset="100%" stop-color="#7a5c00"/>
          </radialGradient>
        </defs>
      </svg>
    </button>
    <span id="bell-label">MUSIC</span>
  </div>

  <!-- ══ MAIN MENU PAGE ══ -->
  <div id="main-page">
    <div class="lang-container">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <!-- Logo SVG -->
      <div class="logo-wrap">
        <svg class="logo-svg" viewBox="0 0 420 110" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <!-- Main gold gradient for text -->
            <linearGradient id="textGold" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stop-color="#fff8c0"/>
              <stop offset="18%"  stop-color="#f0d060"/>
              <stop offset="50%"  stop-color="#c9a227"/>
              <stop offset="82%"  stop-color="#a07820"/>
              <stop offset="100%" stop-color="#7a5c00"/>
            </linearGradient>
            <!-- Glow filter -->
            <filter id="goldGlow" x="-20%" y="-40%" width="140%" height="180%">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
            <!-- Wing feather gradient -->
            <linearGradient id="wingGold" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"   stop-color="#f0d060" stop-opacity="0.9"/>
              <stop offset="100%" stop-color="#7a5c00" stop-opacity="0.4"/>
            </linearGradient>
            <!-- Shimmer animation gradient -->
            <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%"   stop-color="#c9a227" stop-opacity="0"/>
              <stop offset="50%"  stop-color="#fff8c0" stop-opacity="0.6"/>
              <stop offset="100%" stop-color="#c9a227" stop-opacity="0"/>
              <animateTransform attributeName="gradientTransform" type="translate"
                from="-1 0" to="2 0" dur="3s" repeatCount="indefinite"/>
            </linearGradient>
          </defs>

          <!-- Left wing (falling/broken) -->
          <g opacity="0.7">
            <path d="M 60 55 C 40 40, 10 28, 2 10" stroke="url(#wingGold)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
            <path d="M 60 55 C 42 45, 16 38, 8 20" stroke="url(#wingGold)" stroke-width="1.1" fill="none" stroke-linecap="round"/>
            <path d="M 60 55 C 44 50, 22 48, 14 30" stroke="url(#wingGold)" stroke-width="0.9" fill="none" stroke-linecap="round"/>
            <path d="M 60 55 C 46 54, 28 58, 20 42" stroke="url(#wingGold)" stroke-width="0.7" fill="none" stroke-linecap="round"/>
            <path d="M 60 55 C 48 58, 34 68, 24 56" stroke="url(#wingGold)" stroke-width="0.6" fill="none" stroke-linecap="round" opacity="0.6"/>
            <!-- feather tips glow dots -->
            <circle cx="2"  cy="10" r="1.5" fill="#f0d060" opacity="0.7"/>
            <circle cx="8"  cy="20" r="1.2" fill="#f0d060" opacity="0.5"/>
            <circle cx="14" cy="30" r="1"   fill="#f0d060" opacity="0.4"/>
          </g>

          <!-- Right wing (mirrored, slightly different angle) -->
          <g opacity="0.7" transform="translate(420,0) scale(-1,1)">
            <path d="M 60 55 C 40 40, 10 28, 2 10" stroke="url(#wingGold)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
            <path d="M 60 55 C 42 45, 16 38, 8 20" stroke="url(#wingGold)" stroke-width="1.1" fill="none" stroke-linecap="round"/>
            <path d="M 60 55 C 44 50, 22 48, 14 30" stroke="url(#wingGold)" stroke-width="0.9" fill="none" stroke-linecap="round"/>
            <path d="M 60 55 C 46 54, 28 58, 20 42" stroke="url(#wingGold)" stroke-width="0.7" fill="none" stroke-linecap="round"/>
            <path d="M 60 55 C 48 58, 34 68, 24 56" stroke="url(#wingGold)" stroke-width="0.6" fill="none" stroke-linecap="round" opacity="0.6"/>
            <circle cx="2"  cy="10" r="1.5" fill="#f0d060" opacity="0.7"/>
            <circle cx="8"  cy="20" r="1.2" fill="#f0d060" opacity="0.5"/>
            <circle cx="14" cy="30" r="1"   fill="#f0d060" opacity="0.4"/>
          </g>

          <!-- Thin decorative lines above & below text -->
          <line x1="60" y1="18" x2="175" y2="18" stroke="#c9a227" stroke-width="0.5" opacity="0.5"/>
          <line x1="245" y1="18" x2="360" y2="18" stroke="#c9a227" stroke-width="0.5" opacity="0.5"/>
          <circle cx="210" cy="18" r="2.5" fill="none" stroke="#c9a227" stroke-width="0.7" opacity="0.6"/>
          <circle cx="210" cy="18" r="1"   fill="#c9a227" opacity="0.7"/>

          <!-- ── MAIN TEXT: FALL OF ANGELS ── -->
          <!-- Using foreignObject for Cinzel Decorative font -->
          <foreignObject x="60" y="22" width="300" height="65">
            <div xmlns="http://www.w3.org/1999/xhtml" style="
              font-family: 'Cormorant SC', serif;
              font-weight: 700;
              font-size: 36px;
              letter-spacing: 4px;
              text-align: center;
              line-height: 1.1;
              background: linear-gradient(180deg, #fff8c0 0%, #f0d060 18%, #c9a227 50%, #a07820 82%, #7a5c00 100%);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
              background-clip: text;
              filter: drop-shadow(0 0 8px rgba(201,162,39,0.6));
              white-space: nowrap;
              overflow: visible;
            ">FALL OF ANGELS</div>
          </foreignObject>

          <!-- shimmer overlay on text -->
          <rect x="60" y="22" width="300" height="65" fill="url(#shimmer)" opacity="0.3"/>

          <!-- Bottom decorative rule -->
          <line x1="80" y1="95" x2="340" y2="95" stroke="#c9a227" stroke-width="0.6" opacity="0.4"/>
          <line x1="105" y1="99" x2="315" y2="99" stroke="#c9a227" stroke-width="0.3" opacity="0.25"/>
          <!-- small diamonds on rule -->
          <path d="M210 92 L213 95 L210 98 L207 95 Z" fill="#c9a227" opacity="0.6"/>
        </svg>
      </div>

      <div class="separator"></div>

      <!-- Tagline bilingual -->
      <div class="tagline">
        <span class="en">Angels will fall, just as humans did.</span>
        <span class="fa">فرشته‌ها سقوط خواهند کرد، همان‌گونه که انسان‌ها کردند.</span>
      </div>

      <div class="separator"></div>

      <div class="lang-label">SELECT LANGUAGE — انتخاب زبان</div>

      <div class="buttons">
        <a class="btn" href="game-fa.html">فارسی</a>
        <a class="btn" href="game-en.html">ENGLISH</a>
      </div>

      <div class="footer-line">
        ████████████████████████████████<br>
        EVIDENCE FILE — DO NOT DISTRIBUTE — CASE OPEN
      </div>
    </div>
  </div>

  <audio id="bg-music"></audio>

  <script>
    const images = [
      'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782303150271.png',
      'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782303780335.png',
      'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782303829426.png',
      'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782303879821.png',
      'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782303927143.png',
      'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782304117198.png',
      'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782304316279.png',
      'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782304529088.png',
    ];

    const randomImg = images[Math.floor(Math.random() * images.length)];
    const imgEl = document.getElementById('intro-img');
    const introEl = document.getElementById('intro');
    const progressEl = document.getElementById('intro-progress');
    const skipBtn = document.getElementById('intro-skip');

    imgEl.src = randomImg;
    imgEl.onload = () => { imgEl.style.opacity = '1'; };
    setTimeout(() => { imgEl.style.opacity = '1'; }, 100);

    progressEl.style.transition = 'width 8000ms linear';
    setTimeout(() => { progressEl.style.width = '100%'; }, 50);

    let endTimer = setTimeout(endIntro, 8000);

    function endIntro() {
      clearTimeout(endTimer);
      introEl.style.opacity = '0';
      introEl.style.transition = 'opacity 0.5s ease';
      setTimeout(() => {
        introEl.style.display = 'none';
        document.getElementById('main-page').classList.add('visible');
        document.getElementById('music-bell-wrap').style.display = 'flex';
        tryAutoplay();
      }, 500);
    }

    skipBtn.addEventListener('click', endIntro);

    // ── Music ──
    const playlist = [
      'https://dl.just-music.ir/music//Soundtrack/Dark/Dark%20Cycle%201%20(2019)/320/02.%20Ein%20Mensch%20-%20Ein%20Schmetterling.mp3',
      'https://dl.just-music.ir/music//Soundtrack/Dark/Dark%20Cycle%201%20(2019)/320/11.%20Gott%20Gib%20Mir%20Gelassenheit.mp3',
      'https://dl.just-music.ir/music//Soundtrack/Dark/Dark%20Cycle%203%20(2020)/320/04%20Die%20Welt%20Geht%20Heute%20Unter.mp3',
    ];
    let trackIdx = 0;
    const audio = document.getElementById('bg-music');
    const bellBtn = document.getElementById('music-bell-btn');
    const muteX = document.getElementById('mute-x');
    let muted = false;

    function loadAndPlay(idx) {
      audio.src = playlist[idx];
      audio.volume = 0.45;
      audio.play().then(() => {
        muted = false;
        bellBtn.classList.remove('muted');
        bellBtn.classList.add('playing');
        muteX.setAttribute('opacity', '0');
      }).catch(() => {});
    }

    // When a track ends, move to next (loops back to 0 after last)
    audio.addEventListener('ended', () => {
      trackIdx = (trackIdx + 1) % playlist.length;
      loadAndPlay(trackIdx);
    });

    function tryAutoplay() {
      loadAndPlay(0);
    }

    // Also try to autoplay immediately on page load (before intro ends)
    // in case user has interacted with the page already
    document.addEventListener('click', function startOnInteraction() {
      if (muted === false && !audio.src) {
        loadAndPlay(trackIdx);
      } else if (audio.paused && !muted) {
        audio.play().catch(() => {});
      }
      document.removeEventListener('click', startOnInteraction);
    }, { once: true });

    bellBtn.addEventListener('click', () => {
      muted = !muted;
      if (muted) {
        audio.pause();
        bellBtn.classList.add('muted');
        bellBtn.classList.remove('playing');
        muteX.setAttribute('opacity', '1');
      } else {
        if (!audio.src) loadAndPlay(trackIdx);
        else audio.play().catch(() => {});
        bellBtn.classList.remove('muted');
        bellBtn.classList.add('playing');
        muteX.setAttribute('opacity', '0');
      }
    });
  </script>
</body>
</html>
