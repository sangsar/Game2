<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پرونده سقوط فرشته‌ها | The Fall of Angels</title>
  <style>
    :root { --bg: #111; --text: #ddd; --accent: #c00; }
    body { 
      font-family: 'Tahoma', Arial, sans-serif; 
      margin: 0; padding: 0; 
      background: var(--bg); 
      color: var(--text); 
      line-height: 1.6;
    }
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.95); padding: 10px 15px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 1000; border-bottom: 2px solid var(--accent);
    }
    button {
      background: #222; color: white; border: 1px solid #555;
      padding: 8px 14px; margin: 0 5px; cursor: pointer; border-radius: 4px;
    }
    button:hover { background: #444; }
    #game-container { max-width: 900px; margin: 80px auto 40px; padding: 20px; }
    .scene { 
      background: #1a1a1a; padding: 25px; border-radius: 8px; 
      border: 1px solid #333; min-height: 340px; margin-bottom: 20px; white-space: pre-wrap;
    }
    .choice-btn {
      display: block; width: 100%; margin: 12px 0;
      padding: 14px; background: #222; border: 1px solid #555;
      text-align: right; border-radius: 6px; font-size: 1.05em;
    }
    .choice-btn:hover { background: #333; border-color: var(--accent); }

    .theme-retro { --bg: #2c1e12; --text: #e8d5b8; --accent: #b85; }
    .theme-noir { --bg: #0a0a0a; --text: #bbb; --accent: #ddd; }
    .theme-digital { --bg: #001100; --text: #00ff99; --accent: #0f0; font-family: 'Courier New', monospace; }

    h1 { text-align: center; color: var(--accent); }
  </style>
</head>
<body>
  <div id="header">
    <div>
      <button id="theme-btn">تغییر تم</button>
      <button id="lang-btn">EN / FA</button>
    </div>
    <div id="game-title">پرونده سقوط فرشته‌ها</div>
  </div>

  <div id="game-container">
    <div id="intro-screen">
      <h1>The Fall of Angels</h1>
      <p>بازی تعاملی جنایی روانشناختی</p>
      <button id="start-btn" style="font-size: 1.4em; padding: 18px 50px;">شروع بازی</button>
    </div>

    <div id="game-screen" style="display: none;">
      <div class="scene" id="scene"></div>
      <div id="choices"></div>
      <div style="margin-top: 20px; text-align: center; font-size: 0.95em;">
        عدالت: <span id="justice">0</span> | 
        همدلی: <span id="empathy">0</span> | 
        شک: <span id="doubt">0</span>
      </div>
    </div>

    <div id="end-screen" style="display: none; text-align: center;">
      <h2>پایان پرونده</h2>
      <div id="ending-text"></div>
      <button id="restart-btn" style="margin-top: 30px;">بازی دوباره</button>
    </div>
  </div>

  <script type="module">
    import { STORY_ENGLISH } from './story-english.js';
    import { STORY_PERSIAN } from './story-persian.js';

    let currentStory = STORY_PERSIAN;
    let currentSceneId = 'intro';
    let playerParams = { justice: 0, empathy: 0, pragmatism: 0, doubt: 0, resolve: 0 };
    let currentTheme = 'default';

    function renderScene() {
      const scene = currentStory[currentSceneId];
      if (!scene) {
        showEnding();
        return;
      }

      document.getElementById('scene').innerHTML = scene.text.join('<br><br>');

      const choicesDiv = document.getElementById('choices');
      choicesDiv.innerHTML = '';

      scene.choices.forEach((choice, index) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = choice.label;
        btn.onclick = () => makeChoice(choice);
        choicesDiv.appendChild(btn);
      });

      // بروزرسانی آمار
      document.getElementById('justice').textContent = playerParams.justice;
      document.getElementById('empathy').textContent = playerParams.empathy;
      document.getElementById('doubt').textContent = playerParams.doubt;
    }

    function makeChoice(choice) {
      if (choice.params) {
        Object.keys(choice.params).forEach(key => {
          playerParams[key] = (playerParams[key] || 0) + (choice.params[key] || 0);
        });
      }
      currentSceneId = choice.next || 'end';
      renderScene();
    }

    function showEnding() {
      document.getElementById('game-screen').style.display = 'none';
      document.getElementById('end-screen').style.display = 'block';

      let ending = `<p>پرونده بسته شد.</p><p><strong>شخصیت نهایی شما:</strong></p>`;
      ending += `عدالت: ${playerParams.justice}<br>`;
      ending += `همدلی: ${playerParams.empathy}<br>`;
      ending += `عمل‌گرایی: ${playerParams.pragmatism}<br>`;
      ending += `شک: ${playerParams.doubt}<br>`;
      ending += `اراده: ${playerParams.resolve || 0}`;

      document.getElementById('ending-text').innerHTML = ending;
    }

    function toggleTheme() {
      const themes = ['default', 'retro', 'noir', 'digital'];
      const idx = themes.indexOf(currentTheme);
      currentTheme = themes[(idx + 1) % themes.length];
      document.body.className = currentTheme === 'default' ? '' : `theme-${currentTheme}`;
    }

    function toggleLanguage() {
      currentStory = currentStory === STORY_PERSIAN ? STORY_ENGLISH : STORY_PERSIAN;
      currentSceneId = 'intro';
      document.getElementById('game-screen').style.display = 'none';
      document.getElementById('intro-screen').style.display = 'block';
    }

    // Event Listeners
    document.getElementById('start-btn').addEventListener('click', () => {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'block';
      renderScene();
    });

    document.getElementById('theme-btn').addEventListener('click', toggleTheme);
    document.getElementById('lang-btn').addEventListener('click', toggleLanguage);
    document.getElementById('restart-btn').addEventListener('click', () => location.reload());

    // تشخیص زبان مرورگر
    if (navigator.language.startsWith('en')) {
      currentStory = STORY_ENGLISH;
    }

    console.log("✅ بازی با موفقیت لود شد - نسخه دیباگ");
  </script>
</body>
</html>
