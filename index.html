<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سقوط فرشته‌ها | Fall of Angels</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Cinzel:wght@400;600;700&family=Share+Tech+Mono&family=Vazirmatn:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050400;
            --paper: #0a0900;
            --gold: #c9a227;
            --gold2: #f0d060;
            --text: #e8d890;
            --mid: #a07820;
            --dim: #3a3000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── SLIDESHOW ── */
        #intro {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #intro-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        #intro-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 0%;
            background: var(--gold);
            box-shadow: 0 0 8px var(--gold);
        }
        #intro-skip {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: transparent;
            border: 1px solid rgba(201, 162, 39, 0.4);
            color: rgba(201, 162, 39, 0.7);
            padding: 7px 18px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }
        #intro-skip:hover {
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 0 12px rgba(201, 162, 39, 0.2);
        }

        /* ── BELL (always on top - moved to LEFT) ── */
        #bell-wrap {
            position: fixed;
            top: 18px;
            left: 22px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        #bell-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            outline: none;
        }
        #bell-btn svg {
            width: 34px;
            height: 34px;
            filter: drop-shadow(0 0 6px rgba(201, 162, 39, 0.5));
            transition: filter 0.2s, transform 0.2s;
        }
        #bell-btn:hover svg {
            transform: scale(1.1);
            filter: drop-shadow(0 0 14px rgba(240, 208, 96, 0.8));
        }
        #bell-btn.off svg {
            opacity: 0.4;
            filter: none;
        }
        @keyframes swing {
            0%,
            100% {
                transform: rotate(0)
            }
            20% {
                transform: rotate(12deg)
            }
            50% {
                transform: rotate(-10deg)
            }
            75% {
                transform: rotate(6deg)
            }
        }
        #bell-btn.on svg {
            animation: swing 3s ease-in-out infinite;
            transform-origin: top center;
        }
        #bell-lbl {
            font-size: 0.42rem;
            letter-spacing: 2px;
            color: rgba(201, 162, 39, 0.4);
        }

        /* ── MAIN PAGE ── */
        #main {
            display: none;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }
        #main.show {
            display: flex;
        }
        #main::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 255, 255, 0.007) 2px, rgba(255, 255, 255, 0.007) 4px);
        }
        #main::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse at center, rgba(201, 162, 39, 0.04) 0%, transparent 65%);
        }

        .box {
            max-width: 560px;
            width: 100%;
            text-align: center;
            border: 1px solid #2a2000;
            padding: 48px 36px 40px;
            position: relative;
            background: var(--paper);
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.95), 0 0 40px rgba(201, 162, 39, 0.05), inset 0 0 60px rgba(0, 0, 0, 0.6);
            z-index: 2;
        }
        .box::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 1px solid #1a1400;
            pointer-events: none;
        }
        .c {
            position: absolute;
            width: 18px;
            height: 18px;
            border-style: solid;
            border-color: var(--gold);
            opacity: 0.5;
        }
        .tl {
            top: 4px;
            left: 4px;
            border-width: 1px 0 0 1px
        }
        .tr {
            top: 4px;
            right: 4px;
            border-width: 1px 1px 0 0
        }
        .bl {
            bottom: 4px;
            left: 4px;
            border-width: 0 0 1px 1px
        }
        .br {
            bottom: 4px;
            right: 4px;
            border-width: 0 1px 1px 0
        }

        /* ── LOGO AREA ── */
        .logo-area {
            margin: 0 0 20px;
            position: relative;
            z-index: 1;
        }
        .logo-svg {
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 380px;
            height: auto;
            filter: drop-shadow(0 0 16px rgba(201, 162, 39, 0.35));
        }

        /* ── SEPARATOR ── */
        .sep {
            border: none;
            border-top: 1px solid #1a1400;
            margin: 22px 0 28px;
            position: relative;
        }
        .sep::before {
            content: '◆';
            position: absolute;
            top: -7px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--paper);
            padding: 0 8px;
            font-size: 0.45rem;
            color: var(--gold);
        }

        /* ── BUTTONS ── */
        .btns {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 0;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
        }
        .btn {
            background: transparent;
            border: 1px solid #3a3000;
            color: var(--text);
            padding: 14px 0;
            width: 160px;
            min-width: 160px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            cursor: pointer;
            letter-spacing: 4px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--gold);
            transform: scaleX(0);
            transition: transform 0.3s;
        }
        .btn:hover {
            border-color: var(--gold);
            color: var(--gold2);
            box-shadow: 0 0 20px rgba(201, 162, 39, 0.1), inset 0 0 20px rgba(201, 162, 39, 0.04);
        }
        .btn:hover::after {
            transform: scaleX(1);
        }

        .footer {
            font-size: 0.48rem;
            letter-spacing: 2px;
            color: #1a1400;
            line-height: 2.2;
            position: relative;
            z-index: 1;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            .box {
                padding: 32px 18px 30px;
            }
            .btns {
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }
            .btn {
                width: 180px;
                min-width: 180px;
            }
            .logo-svg {
                max-width: 280px;
            }
            #bell-wrap {
                top: 10px;
                left: 12px;
            }
            #bell-btn svg {
                width: 28px;
                height: 28px;
            }
            #intro-skip {
                bottom: 16px;
                right: 12px;
                padding: 5px 12px;
                font-size: 0.5rem;
            }
        }
    </style>
</head>

    <audio id="snd" loop preload="auto"></audio>

    <script>
        // ── Images ──
        const IMGS = [
            'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782303150271.png',
            'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782303780335.png',
            'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782303829426.png',
            'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782303879821.png',
            'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782303927143.png',
            'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782304117198.png',
            'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782304316279.png',
            'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782304529088.png',
        ];

        // ── Music ──
        const MUSIC = 'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/music.mp3';
        const snd = document.getElementById('snd');
        snd.src = MUSIC;
        snd.volume = 0.5;

        const bellBtn = document.getElementById('bell-btn');
        const bellLbl = document.getElementById('bell-lbl');
        let playing = false;
        let userToggledBell = false; // track if user manually toggled the bell

        function setPlaying(v) {
            playing = v;
            bellBtn.className = v ? 'on' : 'off';
            bellLbl.textContent = v ? 'MUSIC' : 'MUTED';
        }

        function tryPlay() {
            if (userToggledBell && !playing) return; // respect user's choice to mute
            snd.play().then(() => setPlaying(true)).catch(() => setPlaying(false));
        }

        // Bell button click handler
        bellBtn.addEventListener('click', () => {
            userToggledBell = true;
            if (playing) {
                snd.pause();
                setPlaying(false);
            } else {
                snd.play().then(() => setPlaying(true)).catch(() => setPlaying(false));
            }
        });

        // ── Aggressive music autoplay ──
        // Try immediately on script execution
        tryPlay();

        // Try on DOM load
        window.addEventListener('DOMContentLoaded', tryPlay);

        // Try on full load
        window.addEventListener('load', tryPlay);

        // Try on ANY user interaction (first click, tap, or keypress anywhere on page)
        function interactionHandler() {
            if (!playing) tryPlay();
        }
        document.addEventListener('click', interactionHandler, { once: false });
        document.addEventListener('touchstart', interactionHandler, { once: false });
        document.addEventListener('keydown', interactionHandler, { once: false });

        // ── Slideshow ──
        const imgEl = document.getElementById('intro-img');
        const introEl = document.getElementById('intro');
        const barEl = document.getElementById('intro-bar');
        const skipBtn = document.getElementById('intro-skip');
        const mainEl = document.getElementById('main');

        // Shuffle images
        const list = [...IMGS].sort(() => Math.random() - 0.5);
        const PER = 1400; // ms per image
        const FADE = 350; // ms fade
        const totalDuration = list.length * PER;

        let idx = 0;
        let timer = null;
        let done = false;
        let firstImageShown = false;

        // ── Start slideshow IMMEDIATELY (no waiting for all images to preload) ──
        function startSlideshow() {
            if (done) return;

            // Animate bar over total duration
            barEl.style.transition = `width ${totalDuration}ms linear`;
            requestAnimationFrame(() => {
                barEl.style.width = '100%';
            });

            // Show first image right away
            showImage(0);

            // Start the rotation timer
            timer = setInterval(() => {
                idx++;
                if (idx >= list.length) {
                    clearInterval(timer);
                    endIntro();
                    return;
                }
                showImage(idx);
            }, PER);
        }

        function showImage(i) {
            // Fade out current
            imgEl.style.opacity = '0';

            setTimeout(() => {
                imgEl.src = list[i];
                imgEl.style.transition = `opacity ${FADE}ms ease`;
                // When this image loads, fade it in
                const onLoad = () => {
                    imgEl.style.opacity = '1';
                    imgEl.removeEventListener('load', onLoad);
                    imgEl.removeEventListener('error', onLoad);
                    if (!firstImageShown) {
                        firstImageShown = true;
                    }
                };
                const onError = () => {
                    // If image fails, skip to next after a short delay
                    imgEl.removeEventListener('load', onLoad);
                    imgEl.removeEventListener('error', onError);
                    if (!firstImageShown && i < list.length - 1) {
                        // Try next image for first display
                        idx = i + 1;
                        showImage(idx);
                    } else if (!firstImageShown) {
                        // All failed, just show main page
                        firstImageShown = true;
                        imgEl.style.opacity = '0';
                    }
                };
                imgEl.addEventListener('load', onLoad);
                imgEl.addEventListener('error', onError);

                // Fallback: if image doesn't load within 2s, fade in anyway
                setTimeout(() => {
                    if (!firstImageShown && i === 0) {
                        firstImageShown = true;
                        imgEl.style.opacity = '1';
                    }
                }, 2000);

            }, FADE);
        }

        function endIntro() {
            if (done) return;
            done = true;
            clearInterval(timer);
            introEl.style.transition = 'opacity 0.8s ease';
            introEl.style.opacity = '0';
            setTimeout(() => {
                introEl.style.display = 'none';
                mainEl.classList.add('show');
                // Try music after slideshow ends (user has seen the intro)
                tryPlay();
            }, 800);
        }

        // Skip button
        skipBtn.addEventListener('click', () => {
            endIntro();
        });

        // ── KICK OFF ──
        // Start slideshow immediately - first image will load asap
        startSlideshow();

        // Preload remaining images in background
        list.forEach((src, i) => {
            if (i > 0) {
                const preloadImg = new Image();
                preloadImg.src = src;
            }
        });
    </script>
</body>
</html>
