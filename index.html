<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سقوط فرشته‌ها | Fall of Angels</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Special+Elite&family=Cinzel:wght@400;700&family=Uncial+Antiqua&family=MedievalSharp&family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ===== MENU OVERLAY ===== -->
    <div id="menu-overlay" class="menu-overlay">
        <div class="menu-panel">
            <div class="menu-logo">
                <span class="logo-icon">🕊️</span>
                <h1 class="logo-title">The Fall of Angels</h1>
                <span class="logo-sub">— پرونده‌ی سقوط فرشته‌ها —</span>
            </div>
            <div class="menu-buttons">
                <button id="btn-start" class="menu-btn primary">شروع بازی جدید</button>
                <button id="btn-continue" class="menu-btn secondary">ادامه بازی</button>
                <button id="btn-settings" class="menu-btn tertiary">⚙️ تنظیمات</button>
            </div>
            <div class="menu-footer">
                <span>🕵️ Fremant P.D. — Case #011</span>
            </div>
        </div>
    </div>

    <!-- ===== SETTINGS PANEL ===== -->
    <div id="settings-panel" class="settings-panel" style="display:none;">
        <div class="settings-content">
            <h2>تنظیمات</h2>
            <div class="setting-group">
                <label>زبان</label>
                <div class="btn-group">
                    <button class="set-btn active" data-lang="fa">فارسی</button>
                    <button class="set-btn" data-lang="en">English</button>
                </div>
            </div>
            <div class="setting-group">
                <label>تم</label>
                <div class="btn-group theme-group">
                    <button class="set-btn active" data-theme="noir">🖤 نوآر</button>
                    <button class="set-btn" data-theme="blood">🩸 خون</button>
                    <button class="set-btn" data-theme="retro">📜 کهنه</button>
                    <button class="set-btn" data-theme="ice">❄️ یخ</button>
                    <button class="set-btn" data-theme="silver">⚪ نقره</button>
                    <button class="set-btn" data-theme="royal">👑 سلطنتی</button>
                </div>
            </div>
            <div class="setting-group">
                <label>سرعت تایپ</label>
                <input type="range" id="typing-speed" min="1" max="100" value="40" />
                <span id="speed-label">۴۰</span>
            </div>
            <button id="btn-close-settings" class="menu-btn secondary">بستن</button>
        </div>
    </div>

    <!-- ===== HEADER با دکمه‌های زبان و تم ===== -->
    <header id="game-header" class="game-header" style="display:none;">
        <div class="header-left">
            <span class="badge">📁</span>
            <span class="badge-text" id="case-id">CASE FILE #011</span>
        </div>
        <div class="header-center">
            <h1 id="header-title">The Fall of Angels</h1>
            <span class="header-sub" id="header-sub">— A Noir Detective Story —</span>
        </div>
        <div class="header-right">
            <button id="btn-lang" class="header-btn">🇮🇷 فارسی</button>
            <button id="btn-theme" class="header-btn">🖤 Noir</button>
            <span class="status-dot"></span>
            <span class="status-text" id="status-text">ACTIVE</span>
        </div>
    </header>

    <!-- ===== GAME CONTAINER ===== -->
    <main id="game-container" class="game-container" style="display:none;"></main>

    <!-- ===== FOOTER ===== -->
    <footer id="game-footer" class="game-footer" style="display:none;">
        <span>🕵️‍♂️</span>
        <span>Fremant P.D. — Case Closed? Never.</span>
        <span>🔍</span>
    </footer>

    <!-- ===== SCRIPTS ===== -->
    <script src="story_fa.js"></script>
    <script src="story_en.js"></script>
    <script src="game.js"></script>
</body>
</html>
