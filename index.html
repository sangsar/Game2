<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سقوط فرشته‌ها | پرونده‌های فریمانت</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- افکت برفک/نویز برای اتمسفر نوآر -->
    <div class="noir-overlay"></div>

    <div class="game-container">
        <!-- هدر بازی: نام شهر و وضعیت پرونده -->
        <header class="game-header">
            <div class="location">📍 شهر فریمانت / جنگل حاشیه شهر</div>
            <div class="status-bar">
                <span>کارآگاه: ویلیام</span>
            </div>
        </header>

        <main class="game-main">
            <!-- محل قرارگیری متن داستان و دیالوگ‌ها -->
            <div id="story-text" class="story-box">
                <p class="dialogue"><span class="character">بلیک:</span> دیر اومدی. چند ساعت پیش منتژرت بودم، کجا بودی؟</p>
            </div>

            <!-- محل قرارگیری گزینه‌ها و انتخاب‌های بازیکن -->
            <div id="choices-container" class="choices-box">
                <button class="choice-btn">۱. یه کار شخصی داشتم.</button>
                <button class="choice-btn">۲. مهم نیست، بهم بگو چی شده.</button>
            </div>
        </main>

        <!-- فوتر: کپی‌رایت یا اطلاعات جانبی -->
        <footer class="game-footer">
            <p>فرمان یازدهم: هرگز از چیزی که هستید فرار نکنید.</p>
        </footer>
    </div>

    <script src="story.js"></script>
    <script src="app.js"></script>
</body>
</html>
