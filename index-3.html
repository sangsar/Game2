<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پرونده‌ی سقوط فرشته‌ها</title>

<!-- ============================================================
     Story scripts: each must define its data on `window`.
     We don't assume the exact variable name — see detectStory()
     below, which checks several common patterns at runtime.
     ============================================================ -->
<script src="./story-persian.js" defer></script>
<script src="./story-english.js" defer></script>

<style>
/* ============================================================
   BASE / RESET
   ============================================================ */
:root{
  --transition-fast: 150ms ease;
  --transition-med: 350ms ease;
}
*{ box-sizing: border-box; }
html, body{
  margin:0; padding:0; min-height:100vh;
  -webkit-tap-highlight-color: transparent;
}
body{
  font-family: system-ui, sans-serif;
  transition: background-color var(--transition-med), color var(--transition-med);
  overflow-x: hidden;
}
button{ font-family: inherit; cursor: pointer; }
.hidden{ display:none !important; }
img{ max-width:100%; }

/* ============================================================
   TOP CONTROL BAR (theme + language toggles)
   ============================================================ */
#topbar{
  position: fixed; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:center;
  padding: 8px 12px;
  z-index: 1000;
  pointer-events:none;
}
#topbar > *{ pointer-events:auto; }
.ctrl-btn{
  border: 1px solid currentColor;
  background: transparent;
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 12px;
  letter-spacing: 0.02em;
  opacity: 0.75;
  transition: opacity var(--transition-fast), transform var(--transition-fast);
}
.ctrl-btn:hover{ opacity:1; transform: translateY(-1px); }
.ctrl-btn:focus-visible{ outline: 2px solid currentColor; outline-offset: 2px; }
.ctrl-group{ display:flex; gap:6px; }

/* ============================================================
   APP SHELL
   ============================================================ */
#app{
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding: 64px 16px 32px;
}
.screen{
  width:100%; max-width: 720px;
  margin: 0 auto;
}

/* ============================================================
   INTRO SCREEN
   ============================================================ */
#intro-screen{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center;
  min-height: 80vh;
  gap: 24px;
}
#intro-title{
  font-size: clamp(1.8rem, 5vw, 3rem);
  margin:0; line-height:1.25;
}
#intro-tagline{
  font-size: 1rem;
  max-width: 520px;
  line-height:1.8;
  opacity:0.85;
  margin:0;
}
#start-btn{
  margin-top: 12px;
  padding: 14px 40px;
  font-size: 1.1rem;
  border-radius: 6px;
  border: 2px solid currentColor;
  background: transparent;
  transition: all var(--transition-fast);
}
#start-btn:hover{ transform: translateY(-2px); }
#start-btn:focus-visible{ outline: 2px solid currentColor; outline-offset: 3px; }

/* ============================================================
   HUD (parameter bars)
   ============================================================ */
#hud{
  width:100%;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 8px 16px;
  margin-bottom: 24px;
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 11px;
}
.hud-stat{ display:flex; flex-direction:column; gap:3px; }
.hud-label{ display:flex; justify-content:space-between; opacity:0.85; }
.hud-bar-track{ height:5px; border-radius:3px; overflow:hidden; position:relative; }
.hud-bar-fill{ height:100%; transition: width var(--transition-med); border-radius:3px; }

/* ============================================================
   STORY SCREEN
   ============================================================ */
#story-screen{ width:100%; }
#scene-text{
  font-size: 1.05rem;
  line-height: 2;
  white-space: pre-wrap;
  margin-bottom: 28px;
  min-height: 60px;
}
#choices{
  display:flex; flex-direction:column; gap: 10px;
}
.choice-btn{
  text-align: start;
  padding: 14px 18px;
  border-radius: 6px;
  border: 1px solid currentColor;
  background: transparent;
  font-size: 0.95rem;
  line-height:1.6;
  transition: all var(--transition-fast);
}
.choice-btn:hover{ transform: translateX(0); }
.choice-btn:focus-visible{ outline: 2px solid currentColor; outline-offset: 2px; }

/* ============================================================
   ENDING SCREEN
   ============================================================ */
#ending-screen{ text-align:center; }
#ending-title{ font-size: 1.6rem; margin-bottom: 12px; }
#ending-desc{ line-height:1.9; margin-bottom: 28px; font-size:1.02rem; }
#restart-btn{
  padding: 12px 32px;
  border-radius: 6px;
  border: 2px solid currentColor;
  background: transparent;
}

/* Reduced motion respect */
@media (prefers-reduced-motion: reduce){
  *{ transition: none !important; animation: none !important; }
}

/* ============================================================
   THEME: NEWSPAPER (broadsheet)
   ============================================================ */
body.theme-newspaper{
  background: #EFE7D8;
  color: #1C1A17;
  font-family: Georgia, "Times New Roman", serif;
  background-image:
    repeating-linear-gradient(0deg, rgba(0,0,0,0.018) 0px, rgba(0,0,0,0.018) 1px, transparent 1px, transparent 3px);
}
.theme-newspaper #intro-title{
  font-family: "Georgia", serif;
  font-weight:700;
  border-bottom: 4px double #1C1A17;
  padding-bottom: 16px;
}
.theme-newspaper .ctrl-btn{ border-radius:0; border-color:#1C1A17; color:#1C1A17; }
.theme-newspaper #hud{
  background: rgba(0,0,0,0.04);
  border: 1px solid #1C1A17;
  border-radius: 0;
}
.theme-newspaper .hud-bar-track{ background: rgba(0,0,0,0.12); }
.theme-newspaper .hud-bar-fill{ background: #8B1E1E; }
.theme-newspaper .choice-btn{
  border-radius:0; border-color:#1C1A17; color:#1C1A17;
  font-family: Georgia, serif;
}
.theme-newspaper .choice-btn:hover{ background: rgba(0,0,0,0.06); }
.theme-newspaper #start-btn, .theme-newspaper #restart-btn{
  border-radius:0; border-color:#1C1A17; color:#1C1A17;
  font-family: Georgia, serif; font-weight:700;
}
.theme-newspaper #scene-text{ font-family: Georgia, serif; }
.theme-newspaper .screen{ border-inline-start: 3px solid #8B1E1E; padding-inline-start: 18px; }

/* ============================================================
   THEME: CRT TERMINAL  (default)
   ============================================================ */
body.theme-crt{
  background: #060a06;
  color: #3CFF7A;
  font-family: "Courier New", "Consolas", monospace;
}
.theme-crt #app{ position:relative; z-index:1; }
.theme-crt::before{
  content:"";
  position: fixed; inset:0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(60,255,122,0.05) 0px,
    rgba(60,255,122,0.05) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events:none;
  z-index: 2;
}
.theme-crt::after{
  content:"";
  position: fixed; inset:0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
  pointer-events:none;
  z-index: 3;
}
.theme-crt #intro-title, .theme-crt #ending-title{
  text-shadow: 0 0 6px #3CFF7A, 0 0 14px rgba(60,255,122,0.5);
}
.theme-crt .ctrl-btn{ color:#3CFF7A; border-color:#3CFF7A; }
.theme-crt #hud{
  background: rgba(60,255,122,0.06);
  border: 1px solid rgba(60,255,122,0.4);
}
.theme-crt .hud-bar-track{ background: rgba(60,255,122,0.15); }
.theme-crt .hud-bar-fill{ background: #3CFF7A; box-shadow: 0 0 6px #3CFF7A; }
.theme-crt .choice-btn{
  color:#3CFF7A; border-color: rgba(60,255,122,0.5);
}
.theme-crt .choice-btn::before{ content:"> "; opacity:0.7; }
.theme-crt .choice-btn:hover{ background: rgba(60,255,122,0.1); box-shadow: 0 0 8px rgba(60,255,122,0.3); }
.theme-crt #start-btn, .theme-crt #restart-btn{ color:#3CFF7A; border-color:#3CFF7A; }
.theme-crt #scene-text{ text-shadow: 0 0 2px rgba(60,255,122,0.3); }

/* blinking cursor for CRT typing effect */
.theme-crt #scene-text.typing::after{
  content:"▌";
  animation: blink 1s step-end infinite;
  margin-inline-start: 2px;
}
@keyframes blink{ 50%{ opacity:0; } }

/* ============================================================
   THEME: NOIR
   ============================================================ */
body.theme-noir{
  background: #0D0D0F;
  color: #D8D5CE;
  font-family: "Palatino Linotype", "Georgia", serif;
  background-image: radial-gradient(circle at 20% 10%, rgba(255,255,255,0.04), transparent 40%);
}
.theme-noir #intro-title{
  font-style: italic; font-weight:400;
  letter-spacing: 0.03em;
  color:#EDEAE2;
}
.theme-noir .ctrl-btn{ color:#A12B2B; border-color:#A12B2B; border-radius:0; }
.theme-noir #hud{
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius:0;
}
.theme-noir .hud-bar-track{ background: rgba(255,255,255,0.1); }
.theme-noir .hud-bar-fill{ background: #A12B2B; }
.theme-noir .choice-btn{
  border-radius:0; border-color: rgba(255,255,255,0.25); color:#D8D5CE;
}
.theme-noir .choice-btn:hover{ border-color:#A12B2B; background: rgba(161,43,43,0.08); }
.theme-noir #start-btn, .theme-noir #restart-btn{
  border-radius:0; border-color:#A12B2B; color:#EDEAE2;
}
.theme-noir #scene-text{ color:#D8D5CE; }
.theme-noir .screen{ box-shadow: 0 0 60px rgba(0,0,0,0.6) inset; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 480px){
  #app{ padding-top: 56px; }
  .choice-btn{ font-size:0.9rem; padding:12px 14px; }
  #scene-text{ font-size:0.98rem; }
}
</style>
</head>
<body class="theme-crt">

<div id="topbar">
  <div class="ctrl-group">
    <button id="theme-toggle" class="ctrl-btn" type="button" aria-label="تغییر تم">تم</button>
  </div>
  <div class="ctrl-group">
    <button id="lang-toggle" class="ctrl-btn" type="button" aria-label="تغییر زبان">FA/EN</button>
  </div>
</div>

<div id="app">

  <!-- ============== INTRO SCREEN ============== -->
  <section id="intro-screen" class="screen">
    <h1 id="intro-title" data-i18n="introTitle"></h1>
    <p id="intro-tagline" data-i18n="introTagline"></p>
    <button id="start-btn" type="button" data-i18n="startBtn"></button>
  </section>

  <!-- ============== STORY SCREEN (hidden until start) ============== -->
  <section id="story-screen" class="screen hidden">
    <div id="hud"></div>
    <div id="scene-text"></div>
    <div id="choices"></div>
  </section>

  <!-- ============== ENDING SCREEN (hidden until game ends) ============== -->
  <section id="ending-screen" class="screen hidden">
    <h2 id="ending-title"></h2>
    <p id="ending-desc"></p>
    <button id="restart-btn" type="button" data-i18n="restartBtn"></button>
  </section>

</div>

<script>
(function(){
"use strict";

/* ============================================================
   I18N STRINGS (UI chrome only — story text comes from the
   story files themselves, in whichever language is active)
   ============================================================ */
const UI_STRINGS = {
  fa: {
    introTitle: "پرونده‌ی سقوط فرشته‌ها",
    introTagline: "یک داستان جنایی-تعاملی. هر انتخاب شما روی روان کارآگاه، اعتماد عمومی، و مسیر پرونده اثر می‌گذارد. تصمیم‌هایتان را با دقت بگیرید — راه برگشتی نیست.",
    startBtn: "شروع پرونده",
    restartBtn: "شروع دوباره",
    themeBtnLabel: "تغییر تم",
    langBtnLabel: "تغییر زبان",
    loadError: "متن داستان بارگذاری نشد. اتصال یا مسیر فایل‌های story-persian.js / story-english.js را بررسی کنید.",
    endingFallbackTitle: "پایان پرونده",
  },
  en: {
    introTitle: "The Fall of Angels — Case File",
    introTagline: "An interactive crime story. Every choice shapes the detective's sanity, public trust, and the direction of the case. Choose carefully — there is no undo.",
    startBtn: "Open the Case",
    restartBtn: "Start Over",
    themeBtnLabel: "Switch theme",
    langBtnLabel: "Switch language",
    loadError: "Story text failed to load. Check that story-persian.js / story-english.js are reachable.",
    endingFallbackTitle: "Case Closed",
  }
};

/* ============================================================
   STORY DETECTION
   Tries a list of common global variable names so this shell
   keeps working even if the story files name their export
   differently. Add more candidates here if needed.
   ============================================================ */
function detectStory(lang){
  const candidatesByLang = {
    fa: ["STORY_PERSIAN", "STORY_FA", "STORY_FARSI", "storyPersian", "storyFa", "STORY"],
    en: ["STORY_ENGLISH", "STORY_EN", "storyEnglish", "storyEn", "STORY"]
  };
  const tryNames = candidatesByLang[lang] || [];
  for (const name of tryNames){
    if (window[name] && typeof window[name] === "object"){
      return window[name];
    }
  }
  // Fallback: scan window for anything that looks like a scene graph
  // (object whose values have `text` and `choices` keys).
  for (const key in window){
    try{
      const val = window[key];
      if (val && typeof val === "object" && !Array.isArray(val)){
        const firstKey = Object.keys(val)[0];
        if (firstKey && val[firstKey] && typeof val[firstKey] === "object" &&
            ("text" in val[firstKey]) && ("choices" in val[firstKey])){
          // Heuristic match on language by key/content hinting
          return val;
        }
      }
    } catch(e){ /* ignore inaccessible globals */ }
  }
  return null;
}

/* ============================================================
   STATE
   ============================================================ */
const PARAM_DEFS = [
  { key: "publicTrust",   fa: "اعتماد عمومی",   en: "Public Trust" },
  { key: "blakeSanity",   fa: "روان بلیک",       en: "Blake's Sanity" },
  { key: "morality",      fa: "اخلاق‌مداری",      en: "Morality" },
  { key: "caseAccuracy",  fa: "دقت پرونده",      en: "Case Accuracy" },
  { key: "partnerBond",   fa: "رابطه با ویلیام",  en: "Partner Bond" },
];

// Map story files' likely param names (English-ish keys used in
// choice.params) onto our 5 canonical stat keys. We accept several
// spellings since we don't control the story file's exact wording.
const PARAM_ALIASES = {
  publicTrust:   ["publicTrust", "trust", "public_trust"],
  blakeSanity:   ["blakeSanity", "sanity", "blake_sanity"],
  morality:      ["morality", "ethics", "justice"],
  caseAccuracy:  ["caseAccuracy", "accuracy", "case_accuracy", "pragmatism"],
  partnerBond:   ["partnerBond", "bond", "partner_bond", "empathy", "resolve", "doubt"],
};

const state = {
  lang: detectBrowserLang(),
  theme: "crt",
  storyData: null,
  currentNodeId: null,
  stats: {},
  history: [],
};

function detectBrowserLang(){
  const nav = (navigator.language || navigator.userLanguage || "fa").toLowerCase();
  return nav.startsWith("fa") ? "fa" : "en";
}

function resetStats(){
  state.stats = {};
  PARAM_DEFS.forEach(p => state.stats[p.key] = 50); // start neutral at 50/100
}

/* ============================================================
   DOM REFS
   ============================================================ */
const $ = (sel) => document.querySelector(sel);
const introScreen = $("#intro-screen");
const storyScreen = $("#story-screen");
const endingScreen = $("#ending-screen");
const sceneTextEl = $("#scene-text");
const choicesEl = $("#choices");
const hudEl = $("#hud");
const startBtn = $("#start-btn");
const restartBtn = $("#restart-btn");
const themeToggle = $("#theme-toggle");
const langToggle = $("#lang-toggle");

/* ============================================================
   I18N APPLY
   ============================================================ */
function applyUiStrings(){
  const t = UI_STRINGS[state.lang];
  document.documentElement.lang = state.lang;
  document.documentElement.dir = state.lang === "fa" ? "rtl" : "ltr";
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (t[key]) el.textContent = t[key];
  });
  themeToggle.setAttribute("aria-label", t.themeBtnLabel);
  langToggle.setAttribute("aria-label", t.langBtnLabel);
}

/* ============================================================
   THEME ENGINE
   ============================================================ */
const THEMES = ["crt", "newspaper", "noir"];
function applyTheme(theme){
  state.theme = theme;
  THEMES.forEach(t => document.body.classList.remove("theme-" + t));
  document.body.classList.add("theme-" + theme);
  try{ localStorage.setItem("fa_theme", theme); }catch(e){}
}
themeToggle.addEventListener("click", () => {
  const idx = THEMES.indexOf(state.theme);
  const next = THEMES[(idx + 1) % THEMES.length];
  applyTheme(next);
});

/* ============================================================
   LANGUAGE ENGINE
   ============================================================ */
function applyLanguage(lang){
  state.lang = lang;
  applyUiStrings();
  // Re-bind story data for the new language; keep node id if it
  // exists in both graphs (ids are expected to match 1:1).
  const newStory = detectStory(lang);
  if (newStory) state.storyData = newStory;
  try{ localStorage.setItem("fa_lang", lang); }catch(e){}
  if (!storyScreen.classList.contains("hidden")){
    renderScene(state.currentNodeId, { skipHistory: true, instant: true });
  }
}
langToggle.addEventListener("click", () => {
  applyLanguage(state.lang === "fa" ? "en" : "fa");
});

/* ============================================================
   HUD RENDER
   ============================================================ */
function renderHud(){
  hudEl.innerHTML = "";
  PARAM_DEFS.forEach(p => {
    const val = Math.max(0, Math.min(100, state.stats[p.key]));
    const wrap = document.createElement("div");
    wrap.className = "hud-stat";
    const label = document.createElement("div");
    label.className = "hud-label";
    const nameSpan = document.createElement("span");
    nameSpan.textContent = state.lang === "fa" ? p.fa : p.en;
    const valSpan = document.createElement("span");
    valSpan.textContent = val;
    label.appendChild(nameSpan);
    label.appendChild(valSpan);
    const track = document.createElement("div");
    track.className = "hud-bar-track";
    const fill = document.createElement("div");
    fill.className = "hud-bar-fill";
    fill.style.width = val + "%";
    track.appendChild(fill);
    wrap.appendChild(label);
    wrap.appendChild(track);
    hudEl.appendChild(wrap);
  });
}

/* ============================================================
   APPLY CHOICE PARAMS TO STATS
   ============================================================ */
function applyParams(params){
  if (!params) return;
  Object.keys(params).forEach(rawKey => {
    const delta = params[rawKey];
    // find which canonical stat this raw key maps to
    let mappedKey = null;
    for (const canon in PARAM_ALIASES){
      if (PARAM_ALIASES[canon].includes(rawKey)){ mappedKey = canon; break; }
    }
    if (!mappedKey && PARAM_DEFS.some(p => p.key === rawKey)) mappedKey = rawKey;
    if (mappedKey){
      state.stats[mappedKey] = (state.stats[mappedKey] || 50) + delta;
    }
  });
}

/* ============================================================
   SCENE RENDER
   ============================================================ */
function getNode(id){
  if (!state.storyData) return null;
  return state.storyData[id] || null;
}

function renderScene(nodeId, opts){
  opts = opts || {};
  const node = getNode(nodeId);
  if (!node){
    renderLoadError();
    return;
  }
  state.currentNodeId = nodeId;
  if (!opts.skipHistory) state.history.push(nodeId);

  introScreen.classList.add("hidden");
  endingScreen.classList.add("hidden");
  storyScreen.classList.remove("hidden");

  renderHud();

  const fullText = Array.isArray(node.text) ? node.text.join("\n") : String(node.text || "");
  sceneTextEl.textContent = fullText;

  choicesEl.innerHTML = "";
  if (node.isEnding || !node.choices || node.choices.length === 0){
    renderEnding(node);
    return;
  }

  node.choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.type = "button";
    btn.textContent = choice.label;
    btn.addEventListener("click", () => {
      applyParams(choice.params);
      renderScene(choice.next);
    });
    choicesEl.appendChild(btn);
  });
}

function renderEnding(node){
  storyScreen.classList.add("hidden");
  endingScreen.classList.remove("hidden");
  const t = UI_STRINGS[state.lang];
  const title = node.endingTitle || t.endingFallbackTitle;
  $("#ending-title").textContent = title;
  const desc = Array.isArray(node.text) ? node.text.join("\n") : String(node.text || "");
  $("#ending-desc").textContent = desc;
}

function renderLoadError(){
  storyScreen.classList.remove("hidden");
  introScreen.classList.add("hidden");
  const t = UI_STRINGS[state.lang];
  sceneTextEl.textContent = t.loadError;
  choicesEl.innerHTML = "";
  hudEl.innerHTML = "";
}

/* ============================================================
   START / RESTART
   ============================================================ */
function startGame(){
  resetStats();
  state.history = [];
  const story = detectStory(state.lang);
  if (!story){
    renderLoadError();
    return;
  }
  state.storyData = story;
  const firstId = Object.keys(story)[0];
  renderScene(firstId);
}

startBtn.addEventListener("click", startGame);
restartBtn.addEventListener("click", () => {
  endingScreen.classList.add("hidden");
  introScreen.classList.remove("hidden");
});

/* ============================================================
   INIT
   ============================================================ */
function init(){
  let savedTheme = "crt";
  let savedLang = state.lang;
  try{
    savedTheme = localStorage.getItem("fa_theme") || "crt";
    savedLang = localStorage.getItem("fa_lang") || state.lang;
  }catch(e){}
  state.lang = savedLang;
  applyTheme(savedTheme);
  applyUiStrings();
}

// Story scripts are loaded with `defer`, so by DOMContentLoaded
// they should already be parsed and have set their globals.
document.addEventListener("DOMContentLoaded", init);

})();
</script>

</body>
</html>
