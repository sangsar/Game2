<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fall of Angels — Case File</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #d4d0c8;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      padding: 20px;
    }

    #game-container {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
    }

    .narrative {
      white-space: pre-wrap;
      line-height: 2;
      font-size: 0.95rem;
      margin-bottom: 32px;
      font-family: inherit;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .choice-btn {
      background: transparent;
      border: 1px solid #444;
      color: #d4d0c8;
      padding: 12px 20px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }

    .choice-btn:hover {
      border-color: #d4d0c8;
      background: #d4d0c8;
      color: #0a0a0a;
    }

    .profile-card {
      border: 1px solid #444;
      padding: 24px;
      margin: 32px 0;
    }

    .profile-title {
      color: #888;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }

    .profile-label {
      font-size: 1.2rem;
      margin: 12px 0;
      color: #d4d0c8;
    }

    .profile-text {
      color: #888;
      line-height: 1.8;
      font-size: 0.9rem;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 24px;
      color: #444;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    .back-link:hover { color: #d4d0c8; }
  </style>
</head>
<body>
  <div id="game-container">
    <a class="back-link" href="index.html">← Back</a>
    <p style="color:#444">Loading...</p>
  </div>

  <script src="story-english.js"></script>
</body>
</html>
