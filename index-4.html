<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fall of Angels | سقوط فرشته‌ها</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #d4d0c8;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 600px;
      width: 90%;
      text-align: center;
      padding: 40px 20px;
    }

    .title {
      font-size: 1.1rem;
      letter-spacing: 4px;
      color: #888;
      margin-bottom: 8px;
    }

    .title-main {
      font-size: 2rem;
      color: #d4d0c8;
      margin-bottom: 4px;
    }

    .divider {
      color: #333;
      margin: 24px 0;
      letter-spacing: 2px;
    }

    .description {
      font-size: 0.9rem;
      line-height: 1.8;
      color: #888;
      margin-bottom: 32px;
    }

    .description span {
      display: block;
      margin-bottom: 12px;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      background: transparent;
      border: 1px solid #444;
      color: #d4d0c8;
      padding: 12px 32px;
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      border-color: #d4d0c8;
      background: #d4d0c8;
      color: #0a0a0a;
    }

    .footer {
      margin-top: 48px;
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="title">CASE FILE</div>
    <div class="title-main">FALL OF ANGELS</div>
    <div class="title" style="direction:rtl">پرونده‌ی سقوط فرشته‌ها</div>

    <div class="divider">━━━━━━━━━━━━━━━━━━━━━━</div>

    <div class="description">
      <span>
        A small town. A serial killer. Choices that cannot be undone.
      </span>
      <span style="direction:rtl">
        یک شهر کوچک. یک قاتل زنجیره‌ای. تصمیم‌هایی که برگشتی ندارن.
      </span>
    </div>

    <div class="buttons">
      <a class="btn" href="fa/index.html">فارسی</a>
      <a class="btn" href="en/index.html">ENGLISH</a>
    </div>

    <div class="footer">FREMONT POLICE DEPT. — CASE #11</div>

  </div>
</body>
</html>
